spring:
  application:
    name: researchgpt-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/researchgpt
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    com.researchgpt: DEBUG

application:
  security:
    jwt:
      # Base64-encoded HMAC-SHA256 key. Local-dev default only — override via
      # the JWT_SECRET_KEY env var in staging/production, never commit a real secret.
      secret-key: ${JWT_SECRET_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVm}
      # 24 hours, in milliseconds
      expiration: ${JWT_EXPIRATION_MS:86400000}