spring:
  application:
    name: researchgpt-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/researchgpt
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      enabled: true
      max-file-size: 25MB
      max-request-size: 25MB

  ai:
    ollama:
      base-url: http://localhost:11434

      embedding:
        options:
          model: nomic-embed-text

      chat:
        options:
          model: gemma3:1b
          temperature: 0.2

      init:
        pull-model-strategy: when_missing

server:
  port: 8080

logging:
  level:
    com.researchgpt: DEBUG
    org.springframework.ai: DEBUG

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVm}
      expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  upload:
    dir: uploads