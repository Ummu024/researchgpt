spring:
  application:
    name: researchgpt-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/researchgpt
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    com.researchgpt: DEBUG
