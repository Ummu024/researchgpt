version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: researchgpt-postgres
    restart: always
    environment:
      POSTGRES_DB: researchgpt
      POSTGRES_USER: researchgpt_user
      POSTGRES_PASSWORD: researchgpt_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: researchgpt-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pg_data:
